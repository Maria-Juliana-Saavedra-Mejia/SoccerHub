<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoccerHub | Teams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/common.css" />
    <link rel="stylesheet" href="../styles/dashboard.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="header__brand">
          <div class="header__logo-wrap" aria-hidden="true">
            <img
              class="header__logo-img"
              src="../assets/soccerhub-logo.png"
              alt=""
              width="120"
              height="120"
              loading="lazy"
            />
          </div>
          <div>
            <h1 class="header__title">SoccerHub</h1>
            <p class="header__tagline">Browse teams and player stats</p>
          </div>
        </div>
      </header>

      <main class="dashboard-main">
        <section class="panel top-actions">
          <span class="badge">User Mode</span>
          <button id="logoutButton" type="button" class="btn btn--ghost">Logout</button>
        </section>

        <nav id="userBreadcrumb" class="breadcrumb" aria-label="Breadcrumb"></nav>

        <section id="teamsView" class="panel panel--elevated panel--teams-showcase">
          <div class="panel__head">
            <h2 class="panel__title">Teams</h2>
          </div>
          <p class="section-note">Select a club to see its squad. Use search to filter teams.</p>
          <label class="field field--inline-max">
            <span class="field__label">Search teams</span>
            <input id="teamSearchInput" type="search" class="field__input" placeholder="Filter by name…" autocomplete="off" />
          </label>
          <div id="teamsGrid" class="teams-grid" role="list"></div>
          <p id="teamsEmpty" class="empty" hidden>No teams match your search.</p>
        </section>

        <section id="playersView" class="panel panel--squad is-hidden">
          <div class="panel__head">
            <h2 class="panel__title" id="playersPanelTitle">Squad</h2>
            <button id="backToTeamsButton" type="button" class="btn btn--ghost">← All teams</button>
          </div>
          <div id="teamClubProfile" class="club-profile" hidden aria-live="polite"></div>
          <div id="teamSquadStats" class="team-squad-summary" hidden aria-live="polite"></div>
          <p class="section-note">Club profile and totals above list this squad. Click a player for full statistics.</p>
          <label class="field field--inline-max">
            <span class="field__label">Search players</span>
            <input id="playerSearchInput" type="search" class="field__input" placeholder="Filter by name or position…" autocomplete="off" />
          </label>
          <div id="playersList" class="players-list" role="list"></div>
          <p id="playersEmpty" class="empty" hidden>No players match your search.</p>
        </section>
      </main>
    </div>

    <div id="statsModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="statsModalTitle" hidden>
      <div class="modal__backdrop" data-modal-close></div>
      <div class="modal__panel">
        <div class="modal__head">
          <h2 id="statsModalTitle" class="modal__title">Player stats</h2>
          <button type="button" class="btn btn--ghost modal__close" data-modal-close aria-label="Close">✕</button>
        </div>
        <div id="statsModalBody" class="modal__body"></div>
      </div>
    </div>

    <script src="../scripts/core.js"></script>
    <script src="../scripts/stats-viz.js"></script>
    <script src="../scripts/user.js"></script>
  </body>
</html>
